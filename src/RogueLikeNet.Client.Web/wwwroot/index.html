<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #gameCanvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; color: #8cf; font-family: monospace; font-size: 1.4rem; z-index: 10;
        }
        #loading .spinner {
            width: 48px; height: 48px; border: 4px solid #333; border-top-color: #8cf;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading.hidden { display: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading...</div>
        <div id="loadingStatus" style="font-size: 0.9rem; color: #666; margin-top: 0.5rem;"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
