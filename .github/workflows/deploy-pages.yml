name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  WEB_PROJECT: src/RogueLikeNet.Client.Web/RogueLikeNet.Client.Web.csproj

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build WASM

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore ${{ env.WEB_PROJECT }}

      - name: Publish
        run: dotnet publish ${{ env.WEB_PROJECT }} -c Release -p:GitHash=${{ github.sha }}

      - name: Write version file
        run: echo '{"hash":"${{ github.sha }}"}' > src/RogueLikeNet.Client.Web/bin/Release/net10.0/browser-wasm/AppBundle/version.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/RogueLikeNet.Client.Web/bin/Release/net10.0/browser-wasm/AppBundle

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
